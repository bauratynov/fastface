name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Note on hardware: GitHub-hosted ubuntu-24.04 runners use Intel Xeon
# Platinum 8171M (Skylake-SP). It has AVX-512 but does NOT have AVX-VNNI
# (the VEX-encoded 256-bit variant, shipped with Alder Lake / Ice Lake-SP+).
# FastFace uses `vpdpbusd` (AVX-VNNI) in its matvec kernel. We therefore:
#   - override -march=native with -march=x86-64-v3 -mavxvnni so the code
#     compiles (gcc emits the VNNI opcodes even though the host can't run
#     them);
#   - mark the steps that actually execute the binary as continue-on-error,
#     so the build + Go unit tests still go green on a VNNI-less runner.
# A self-hosted VNNI runner would execute all steps for real.

jobs:
  regression:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 make python3 python3-pip
          sudo apt-get install -y python3-numpy python3-pil
          pip3 install --break-system-packages onnxruntime --user || true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build (compile only; runtime needs AVX-VNNI CPU)
        run: |
          gcc-13 --version | head -1 | xargs -I{} echo "::notice::GCC: {}"
          set -o pipefail
          if ! make CC=gcc-13 AR=ar CFLAGS_ARCH="-march=x86-64-v3 -mavxvnni" all > /tmp/build.log 2>&1; then
            echo "::error::Build failed. Error-relevant lines:"
            grep -E "error:|undeclared|unknown type|fatal|undefined reference|No such file|Error " /tmp/build.log | tail -40 | while IFS= read -r line; do
              echo "::error::$(printf '%s' "$line" | tr -d '\r' | cut -c1-400)"
            done
            echo "::error::--- last 20 lines of full build log ---"
            tail -20 /tmp/build.log | while IFS= read -r line; do
              echo "::error::$(printf '%s' "$line" | tr -d '\r' | cut -c1-400)"
            done
            exit 1
          fi
          echo "::notice::Build succeeded, $(wc -l < /tmp/build.log) log lines."

      - name: Build libfastface consumer test (compile only)
        run: |
          gcc-13 -O2 -march=x86-64-v3 -mavxvnni -fopenmp -I. \
                 test_libfastface.c libfastface.a -o test_libfastface

      - name: Go build (compile only)
        working-directory: go/fastface
        run: go build -v ./...

      - name: Regression test (requires AVX-VNNI host)
        continue-on-error: true
        run: make PYTHON=python3 test

      - name: Go test (requires AVX-VNNI host)
        continue-on-error: true
        working-directory: go/fastface
        run: go test -v ./...

      - name: C lib consumer run (requires AVX-VNNI host)
        continue-on-error: true
        run: ./test_libfastface

      - name: Peak bench (requires AVX-VNNI host)
        continue-on-error: true
        run: ./fastface_int8 models/w600k_r50_ffw4.bin | head -20

  lfw-accuracy:
    # Optional, only runs on release tags. Needs LFW dataset which isn't
    # checked in — skip with a clear message otherwise. Also skipped if no
    # self-hosted VNNI runner is available.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: LFW dataset check
        run: |
          if [ ! -d data/lfw ]; then
            echo "SKIP: data/lfw not present in repo (dataset not distributed here)"
            exit 0
          fi
      - name: Build
        run: |
          sudo apt-get install -y gcc-13 make python3 python3-pip
          pip3 install --break-system-packages onnxruntime numpy pillow --user
          make CC=gcc-13 AR=ar CFLAGS_ARCH="-march=x86-64-v3 -mavxvnni"
      - name: LFW 10-fold bench
        continue-on-error: true
        run: python3 bench_lfw_full.py
